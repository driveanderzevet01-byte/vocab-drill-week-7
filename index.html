<!DOCTYPE html>
<html lang="en">
<head>

            min-height: 100vh;
        }

            max-width: 1400px;
            margin: 0 auto;
            background: #11131f;
            border-radius: 32px;
            padding: 24px 28px;
            border: 1px solid #252a41;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.6);

        h1, h2, h3 {
            font-weight: 600;
            letter-spacing: -0.3px;
        }

        .gradient-text {
            background: linear-gradient(135deg, #a78bfa, #38bdf8);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: 2rem;
        }

        .timer-panel {
            background: #0b0d16;
            padding: 12px 24px;
            border-radius: 60px;
            display: inline-flex;
            align-items: baseline;
            gap: 16px;
            margin-bottom: 24px;
            border-left: 5px solid #facc15;
            font-weight: 600;
        }

        .timer {
            font-family: 'JetBrains Mono', monospace;
            font-size: 2rem;
            font-weight: 700;
            color: #facc15;
            background: #00000030;
            padding: 0 12px;
            border-radius: 40px;
        }

        .card {
            background: #151b2b;
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 28px;
            border: 1px solid #2d3450;
        }

        label {
            font-weight: 500;
            display: block;
            margin-top: 14px;
            margin-bottom: 6px;
            color: #b9c3e0;
        }

        input, select {
            background: #0a0e1a;
            border: 1px solid #2f3a5c;
            padding: 12px 16px;
            border-radius: 20px;
            width: 100%;
            color: #f1f5f9;
            font-size: 1rem;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #818cf8;
            box-shadow: 0 0 0 2px rgba(129,140,248,0.3);
        }

        button {
            background: #2d3a5e;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 20px;
            margin-right: 12px;
        }

        button.primary {
            background: #4f46e5;
            box-shadow: 0 4px 14px rgba(79,70,229,0.4);
        }

        button.primary:hover {
            background: #6366f1;
            transform: scale(0.98);
        }

        button.danger {
            background: #dc2626;
        }

        .vocab-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 12px;
            max-height: 500px;
            overflow-y: auto;
            padding-right: 8px;
        }

        .vocab-item {
            background: #1a1f33;
            padding: 12px 16px;
            border-radius: 20px;
            border-left: 4px solid #818cf8;
        }

        .vocab-word {
            font-weight: 700;
            font-size: 1.1rem;
            color: #facc15;
        }

        .question-card {
            background: #13182a;
            padding: 18px;
            border-radius: 24px;
            margin-bottom: 16px;
            border: 1px solid #293054;
        }

        .question-text {
            font-weight: 600;
            margin-bottom: 12px;
            font-size: 1rem;
        }

        .options {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 8px;
        }

        .option label {
            margin: 0;
            font-weight: normal;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .wordbank-box {
            background: #0c1020;
            padding: 18px;
            border-radius: 24px;
            margin: 20px 0;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            border: 1px solid #2d3a66;
        }

        .wordbank-word {
            background: #1e2a4a;
            padding: 6px 18px;
            border-radius: 40px;
            font-weight: 600;
            font-family: monospace;
            font-size: 0.9rem;
        }

        .popup {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

            background: #1a1f2e;
            max-width: 900px;
            width: 95%;
            max-height: 85vh;
            overflow-y: auto;
            padding: 28px;
            border-radius: 36px;
            box-shadow: 0 25px 40px black;
        }

        .hidden {
            display: none;
        }

        .answer-summary {
            background: #0e1222;
            padding: 16px;
            border-radius: 24px;
            font-family: 'Segoe UI', system-ui, monospace;
            font-size: 0.85rem;
            max-height: 500px;
            overflow-y: auto;
        }

        .summary-question {
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #2a3250;
        }

        .summary-question strong {
            color: #facc15;
        }

        .summary-answer {
            margin-left: 20px;
            color: #a5b4fc;
        }

        @media print {
            body {
                background: white;
                padding: 0;
                margin: 0;
            }
            .no-print, .timer-panel, button, .popup, #summaryPopup {
                display: none !important;
            }
            .print-pattern {
                background: repeating-linear-gradient(45deg, #f0f2f5 0px, #f0f2f5 3px, #ffffff 3px, #ffffff 15px);
                padding: 20px;
            }
            .container {
                background: white;
                color: black;
                box-shadow: none;
            }
            .answer-summary {
                background: #f8f9fc;
                border: 1px solid #ccc;
                color: black;
            }
            .summary-question strong {
                color: #1e293b;
            }
            .summary-answer {
                color: #334155;
            }

            font-size: 0.7rem;
            text-align: center;
            margin-top: 25px;
            color: #5a668a;
        }

        }

            margin: 20px 0 15px 0;
            padding-bottom: 8px;
            border-bottom: 2px solid #4f46e5;

</head>

    function initAntiCheat() {
        window.addEventListener('blur', () => { if (drillActive && !submitted) handleViolation(); });

        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', (e) => {
            if (drillActive && !submitted && (e.key === 'PrintScreen' || (e.ctrlKey && (e.key === 'p' || e.key === 's')))) {
                e.preventDefault();
                alert("⚠️ Screenshot/print actions are disabled during the drill.");
            }
        });
        let resizeCount = 0;
        window.addEventListener('resize', () => {
            if (drillActive && !submitted && window.innerWidth < 800) {
                resizeCount++;
                if (resizeCount === 1) alert("⚠️ Please maintain full window for the exam.");
                else if (resizeCount >= 2) handleViolation();
            }
        });
    }

    function handleViolation() {
        tabViolations++;

        else if (tabViolations >= 2) {

        summaryHtml += `<hr><h4>Part B: Choose the correct definition (Questions 26-40)</h4>`;
        for (let i = 0; i < 15; i++) {
            let ans = selectedAnswers[`partB_${i}`] || "(not answered)";
            let questionText = currentQuestionsStore.partB[i] || `Definition ${i+1}`;
            summaryHtml += `<div class="summary-question"><strong>Q${26 + i}:</strong> ${questionText}<br><div class="summary-answer">📝 Your answer: ${ans}</div></div>`;
        }
        
        summaryHtml += `<hr><h4>Part C: Fill in the blank using Word Bank (Questions 41-50)</h4>`;
        for (let i = 0; i < 10; i++) {
            let ans = selectedAnswers[`partC_${i}`] || "(empty)";
            let questionText = currentQuestionsStore.partC[i] || `Fill in the blank ${i+1}`;
            summaryHtml += `<div class="summary-question"><strong>Q${41 + i}:</strong> ${questionText}<br><div class="summary-answer">📝 Your answer: ${ans}</div></div>`;
        }
        
        summaryHtml += `<hr><footer style="margin-top:20px;">VOCAB DRILL — Week 7 Official Assessment Report | Generated from secure testing platform</footer></div>`;
        document.getElementById('summaryContent').innerHTML = summaryHtml;
        summaryPopup.classList.remove('hidden');
    }

    document.getElementById('submitDrillBtn').addEventListener('click', () => {
        if (submitted) { alert("Already submitted."); return; }
        gatherAndShowSummary();
    });
    document.getElementById('closeSummaryBtn').addEventListener('click', () => summaryPopup.classList.add('hidden'));
    document.getElementById('printSummaryBtn').addEventListener('click', () => {
        const printContents = document.getElementById('summaryContent').innerHTML;
        const win = window.open();
        win.document.write(`
            <html><head><title>Vocab Drill Summary - ${student.name}</title>
            <style>
                body { font-family: 'Courier New', monospace, sans-serif; padding: 2rem; background: white; }
                .print-pattern { background: repeating-linear-gradient(45deg, #f4f6fc 0px, #f4f6fc 3px, #fff 3px, #fff 15px); padding: 20px; border-radius: 12px; }
                h3, h4 { color: #1e293b; }
                .summary-question { margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid #e2e8f0; }
                .summary-answer { margin-left: 20px; color: #475569; }
                strong { color: #0f172a; }
            </style>
            </head><body>${printContents}</body></html>
        `);
        win.document.close();
        win.print();
    });
    initAntiCheat();
</script>
</body>
</html>
